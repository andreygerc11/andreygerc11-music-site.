<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація | Hertz Spectrum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #09090b; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #141417; padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 77, 77, 0.3); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-back { display: block; margin-bottom: 20px; color: #888; text-decoration: none; font-size: 0.8rem; text-align: left; transition: 0.3s; }
        .btn-back:hover { color: #fff; }
        h2 { color: #ff4d4d; margin-top: 0; margin-bottom: 30px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; font-family: inherit; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff4d4d; }
        .btn-main { width: 100%; padding: 15px; background: #ff4d4d; color: #fff; border: none; border-radius: 50px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-bottom: 20px; font-family: inherit; }
        .btn-main:hover { background: #fff; color: #ff4d4d; }
        .link-bottom { color: #888; text-decoration: underline; font-size: 0.85rem; transition: 0.3s; }
        .link-bottom:hover { color: #fff; }
        
        /* Лінії навколо слова АБО */
        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: #555; font-size: 0.8rem; text-transform: uppercase; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .divider:not(:empty)::before { margin-right: 10px; }
        .divider:not(:empty)::after { margin-left: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <a href="index.html" class="btn-back">← На головну</a>
    <h2>РЕЄСТРАЦІЯ</h2>

    <form id="registerForm">
        <input type="email" id="email" placeholder="Ваш Email" required>
        <input type="password" id="password" placeholder="Придумайте пароль" required>
        <button type="submit" class="btn-main">СТВОРИТИ АКАУНТ</button>
    </form>

    <a href="login.html" class="link-bottom">Вже є акаунт? Увійти</a>

    <div class="divider">АБО</div>

    <div style="display: flex; justify-content: center;">
        <div id="g_id_onload" 
             data-client_id="724333690730-kjj7rl1tn72vq452flbdhb1ngq3q7dqd.apps.googleusercontent.com" 
             data-context="signup" 
             data-ux_mode="popup" 
             data-callback="handleGoogleLogin" 
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" 
             data-type="standard" 
             data-shape="pill" 
             data-theme="filled_black" 
             data-text="signup_with" 
             data-size="large" 
             data-logo_alignment="center">
        </div>
    </div>
</div>

<script>
    // Обробка звичайної реєстрації
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = 'Зачекайте...'; btn.disabled = true;
        try {
            const res = await fetch('https://andreygerc11-music-site.onrender.com/api/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('hz_user', JSON.stringify({ email: document.getElementById('email').value, status: data.status }));
                window.location.href = 'profile.html';
            } else { alert(data.error); btn.innerText = 'СТВОРИТИ АКАУНТ'; btn.disabled = false; }
        } catch (err) { alert('Помилка сервера. Спробуйте пізніше.'); btn.innerText = 'СТВОРИТИ АКАУНТ'; btn.disabled = false; }
    });

    // Розшифровка токена Google
    function parseJwt(token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }

    // Обробка реєстрації через Google
    async function handleGoogleLogin(response) {
        const payload = parseJwt(response.credential);
        try {
            const res = await fetch('https://andreygerc11-music-site.onrender.com/api/social-auth', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: payload.email, name: payload.name })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('hz_user', JSON.stringify({ email: payload.email, status: data.status }));
                window.location.href = 'profile.html';
            } else { alert('Помилка: ' + data.error); }
        } catch (err) { alert('Помилка зв\'язку з сервером.'); }
    }
</script>
</body>
</html>
