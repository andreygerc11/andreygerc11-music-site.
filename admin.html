<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель | Музика</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://unpkg.com/browser-id3-writer@3.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    <style>
        :root { --accent: #ff4d4d; --bg: #0a0a0b; --card: #161618; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-panel { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--accent); width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(255, 77, 77, 0.2); max-height: 90vh; overflow-y: auto; }
        h1 { text-align: center; text-transform: uppercase; font-size: 1.5rem; margin-top: 0; margin-bottom: 20px;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; font-size: 0.9rem; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px; font-family: inherit; box-sizing: border-box; }
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: white; color: var(--accent); }
        .btn:disabled { background: #555; cursor: not-allowed; color: #aaa; }
        #logArea { margin-top: 20px; background: #000; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; color: #4CAF50; height: 200px; overflow-y: auto; border: 1px solid #333; }
        .log-error { color: #ff4d4d; }
        .log-wait { color: #ffcc00; }
        .log-header { color: #00bcd4; font-weight: bold; margin-top: 10px; display: block; }
        
        #logoStatus { background: rgba(76, 175, 80, 0.2); border: 1px solid #4CAF50; padding: 10px; border-radius: 8px; color: #4CAF50; font-size: 0.9rem; display: none; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .btn-small { background: #333; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .btn-small:hover { background: #ff4d4d; }
    </style>
</head>
<body>

<div class="admin-panel">
    <h1>Масове Завантаження</h1>
    
    <div id="logoStatus">
        <span>✅ Логотип завантажено з пам'яті</span>
        <button class="btn-small" onclick="clearLogo()">Змінити</button>
    </div>

    <div class="form-group" id="logoGroup">
        <label>Обери логотип (один раз назавжди):</label>
        <input type="file" id="coverFile" accept="image/jpeg, image/png">
    </div>

    <div class="form-group">
        <label>Обери пісні (можна виділити багато):</label>
        <input type="file" id="audioFiles" accept="audio/mp3" multiple>
    </div>

    <button class="btn" id="startBtn" onclick="startProcess()">Прошити та Завантажити ВСІ</button>

    <div id="logArea">
        > Система готова. Вбудовано фізичну обрізку треків до 1 хв 20 с.<br>
    </div>
</div>

<script>
    const CLIENT_ID = '724333690730-kjj7rl1tn72vq452flbdhb1ngq3q7dqd.apps.googleusercontent.com';
    const FOLDER_FULL = '1FGNuLTq9mFHqoUSqp-7PSKHixZHq3W2j';
    const FOLDER_PREV = '1Vmwzr3kt98gDYIOaPTsZ0f6FwqcOMQ7S';
    const ARTIST_NAME = 'Andriy Hertz';
    const TRIM_DURATION_SECONDS = 80; // 1 хвилина 20 секунд

    const logArea = document.getElementById('logArea');
    const startBtn = document.getElementById('startBtn');
    let finalCoverBuffer = null; 

    function log(msg, type = 'normal') {
        const span = document.createElement('span');
        if (type === 'error') span.className = 'log-error';
        if (type === 'wait') span.className = 'log-wait';
        if (type === 'header') span.className = 'log-header';
        
        span.innerHTML = type === 'header' ? `${msg}<br>` : `> ${msg}<br>`;
        logArea.appendChild(span);
        logArea.scrollTop = logArea.scrollHeight;
    }

    function base64ToArrayBuffer(base64) {
        const binaryString = window.atob(base64.split(',')[1]);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
        return bytes.buffer;
    }

    const savedLogo = localStorage.getItem('myCoverLogo');
    if (savedLogo) {
        finalCoverBuffer = base64ToArrayBuffer(savedLogo);
        document.getElementById('logoGroup').style.display = 'none';
        document.getElementById('logoStatus').style.display = 'flex';
    }

    function clearLogo() {
        localStorage.removeItem('myCoverLogo');
        finalCoverBuffer = null;
        document.getElementById('logoGroup').style.display = 'block';
        document.getElementById('logoStatus').style.display = 'none';
    }

    document.getElementById('coverFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const base64String = event.target.result;
            localStorage.setItem('myCoverLogo', base64String); 
            finalCoverBuffer = base64ToArrayBuffer(base64String);
            log("✅ Логотип збережено в пам'ять браузера!", "wait");
            document.getElementById('logoGroup').style.display = 'none';
            document.getElementById('logoStatus').style.display = 'flex';
        };
        reader.readAsDataURL(file);
    });

    document.getElementById('audioFiles').addEventListener('change', function(e) {
        const filesCount = e.target.files.length;
        if (filesCount > 0) {
            log(`Вибрано файлів для обробки: ${filesCount}`, "wait");
        }
    });

    async function readFileAsArrayBuffer(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(reader.error);
            reader.readAsArrayBuffer(file);
        });
    }

    async function trimAudioToMp3(file, durationSec) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const audioBuffer = await audioCtx.decodeAudioData(e.target.result);

                    const sampleRate = audioBuffer.sampleRate;
                    const channels = audioBuffer.numberOfChannels;
                    const length = Math.min(audioBuffer.length, sampleRate * durationSec);

                    const mp3encoder = new lamejs.Mp3Encoder(channels, sampleRate, 128); 
                    let mp3Data = [];

                    const left = audioBuffer.getChannelData(0);
                    const right = channels > 1 ? audioBuffer.getChannelData(1) : left;

                    const sampleBlockSize = 1152;
                    let left16 = new Int16Array(sampleBlockSize);
                    let right16 = new Int16Array(sampleBlockSize);

                    for (let i = 0; i < length; i += sampleBlockSize) {
                        let chunk = Math.min(sampleBlockSize, length - i);
                        for (let j = 0; j < chunk; j++) {
                            let l = left[i + j];
                            left16[j] = l < 0 ? l * 0x8000 : l * 0x7FFF;
                            if (channels > 1) {
                                let r = right[i + j];
                                right16[j] = r < 0 ? r * 0x8000 : r * 0x7FFF;
                            }
                        }
                        
                        let mp3buf;
                        if (channels === 1) {
                            mp3buf = mp3encoder.encodeBuffer(left16.subarray(0, chunk));
                        } else {
                            mp3buf = mp3encoder.encodeBuffer(left16.subarray(0, chunk), right16.subarray(0, chunk));
                        }
                        if (mp3buf.length > 0) mp3Data.push(mp3buf);
                    }

                    let mp3buf = mp3encoder.flush();
                    if (mp3buf.length > 0) mp3Data.push(mp3buf);

                    resolve(new Blob(mp3Data, { type: 'audio/mp3' }));
                } catch (err) {
                    reject(err);
                }
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
    }

    async function tagAudio(audioBuffer, songName) {
        const writer = new ID3Writer(audioBuffer);
        writer.setFrame('TIT2', songName) 
              .setFrame('TPE1', [ARTIST_NAME]) 
              .setFrame('APIC', {
                  type: 3, 
                  data: finalCoverBuffer, 
                  description: 'Логотип'
              });
        writer.addTag();
        return writer.getBlob();
    }

    async function startProcess() {
        const files = document.getElementById('audioFiles').files;

        if (files.length === 0) {
            log("Помилка: Виберіть хоча б один аудіофайл!", "error");
            return;
        }
        
        if (!finalCoverBuffer) {
            log("Помилка: Виберіть логотип хоча б один раз!", "error");
            return;
        }

        try {
            if (typeof ID3Writer === 'undefined' || typeof lamejs === 'undefined') {
                log("Помилка: Бібліотеки не змогли завантажитись. Перевірте інтернет та оновіть сторінку.", "error");
                return;
            }

            startBtn.disabled = true;
            startBtn.innerText = "Обробка...";
            log(`Авторизація в Google...`, "wait");

            const client = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                // ВИПРАВЛЕНО: Змінено на повний доступ, щоб скрипт міг бачити ваші існуючі папки
                scope: 'https://www.googleapis.com/auth/drive', 
                callback: async (response) => {
                    if (response.error) {
                        log("Помилка доступу до Диску", "error");
                        startBtn.disabled = false;
                        startBtn.innerText = "Прошити та Завантажити ВСІ";
                        return;
                    }
                    
                    log("Доступ отримано! Починаю масову обробку...", "wait");

                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        const name = file.name.trim(); 
                        
                        log(`--- Файл ${i + 1} з ${files.length}: "${name}" ---`, "header");
                        
                        // 1. Обробка ПОВНОГО файлу
                        log(`Прошиваю повний трек логотипом...`);
                        const fullBuffer = await readFileAsArrayBuffer(file);
                        const fullTaggedBlob = await tagAudio(fullBuffer, name);
                        await uploadFileToDrive(fullTaggedBlob, name, FOLDER_FULL, response.access_token);

                        // 2. Обрізка і обробка ПРЕВ'Ю
                        log(`✂️ Обрізаю трек до ${TRIM_DURATION_SECONDS} секунд... (вкладка може на мить підвиснути)`, "wait");
                        
                        // ВИПРАВЛЕНО: Даємо браузеру час оновити текст у логах перед тим, як він почне важку обрізку
                        await new Promise(resolve => setTimeout(resolve, 100));

                        const trimmedBlob = await trimAudioToMp3(file, TRIM_DURATION_SECONDS);
                        
                        log(`Прошиваю прев'ю логотипом...`);
                        const trimmedBuffer = await trimmedBlob.arrayBuffer();
                        const trimmedTaggedBlob = await tagAudio(trimmedBuffer, name);
                        
                        // ВИПРАВЛЕНО: Надійна генерація імені для прев'ю
                        let prevName = name.replace(/\.mp3$/i, ' (Прев\'ю).mp3');
                        if (!prevName.includes('(Прев\'ю)')) prevName += ' (Прев\'ю).mp3';

                        await uploadFileToDrive(trimmedTaggedBlob, prevName, FOLDER_PREV, response.access_token);
                    }

                    log("🎉 УСІ ТРЕКИ УСПІШНО ОБРОБЛЕНО ТА ЗАВАНТАЖЕНО!", "header");
                    startBtn.disabled = false;
                    startBtn.innerText = "Прошити та Завантажити ВСІ";
                    document.getElementById('audioFiles').value = ''; 
                },
            });
            client.requestAccessToken();

        } catch (error) {
            log("Помилка: " + error.message, "error");
            startBtn.disabled = false;
            startBtn.innerText = "Прошити та Завантажити ВСІ";
        }
    }

    async function uploadFileToDrive(fileBlob, name, folderId, token) {
        try {
            let metadata = { name: name, parents: [folderId] };
            let form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', fileBlob, name);

            let res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: form
            });
            let data = await res.json();
            if(data.id) {
                log(`✅ Файл "${name}" успішно завантажено!`);
            } else {
                throw new Error("Немає ID у відповіді");
            }
        } catch (e) {
            log(`❌ Помилка при завантаженні "${name}" на Гугл Диск.`, "error");
        }
    }
</script>

</body>
</html>
