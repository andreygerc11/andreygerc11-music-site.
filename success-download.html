<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завантаження | Андрій Герц</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4dff8c; --dark: #0a0a0b; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: #fff; text-align: center; padding: 100px 20px; margin: 0; }
        .success-card { background: #161618; max-width: 500px; margin: auto; padding: 40px; border-radius: 32px; border: 1px solid var(--accent); box-shadow: 0 0 30px rgba(77, 255, 140, 0.1); }
        h1 { color: var(--accent); font-weight: 900; text-transform: uppercase; margin-bottom: 20px; }
        p { opacity: 0.8; line-height: 1.6; margin-bottom: 30px; }
        .btn-download { display: inline-block; background: var(--accent); color: #000; padding: 18px 35px; border-radius: 50px; text-decoration: none; font-weight: 900; text-transform: uppercase; transition: 0.3s; }
        .btn-download:hover { transform: scale(1.05); background: #fff; }
    </style>
</head>
<body>
    <div class="success-card">
        <h1>Дякуємо за підтримку!</h1>
        <p>Ваш внесок у проєкт «Голос проти раку» успішно отримано. Тепер ви можете завантажити трек або весь архів.</p>
        
        <a href="https://drive.google.com/drive/folders/ТВІЙ_ID_ПАПКИ" class="btn-download">СКАЧАТИ ТРЕКИ</a>
        
        <br><br>
        <a href="index.html" style="color: #555; text-decoration: none; font-size: 0.8rem;">Повернутися на сайт</a>
    </div>
</body>
</html>
