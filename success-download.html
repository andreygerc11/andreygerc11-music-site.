<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завантаження... | Голос проти раку</title>
    <style>
        body { background: #0a0a0b; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .accent { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Дякуємо за підтримку!</h1>
    <p id="status">Визначаємо ваш трек...</p>

    <script>
        // Беремо параметри з посилання (наприклад, ?file=song1.mp3)
        const params = new URLSearchParams(window.location.search);
        const fileName = params.get('file');

        if (fileName) {
            document.getElementById('status').innerHTML = `Завантаження <b>${fileName}</b> почнеться зараз.`;
            
            const link = document.createElement('a');
            link.href = fileName; // Файл береться з кореня вашого GitHub
            link.download = fileName;
            document.body.appendChild(link);
            
            setTimeout(() => {
                link.click(); // Автоматичне скачування
                document.body.removeChild(link);
            }, 1500);
        } else {
            document.getElementById('status').innerText = "Помилка: файл не вказано.";
        }
    </script>
</body>
</html>
