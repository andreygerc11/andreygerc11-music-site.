<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завантаження... | Андрій Герц</title>
    <style>
        body { background: #0a0a0b; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; padding-left: 20px; padding-right: 20px; }
        .timer-circle { width: 100px; height: 100px; border: 5px solid #222; border-top: 5px solid #ff4d4d; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { border-top-color: #ff4d4d; } 50% { border-top-color: #fff; } 100% { border-top-color: #ff4d4d; } }
        .btn-download { background: #ff4d4d; color: white; padding: 18px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; display: none; margin-top: 25px; font-size: 1.2rem; box-shadow: 0 5px 20px rgba(255, 77, 77, 0.4); }
        #countdown-text { font-size: 1.2rem; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Дякуємо за підтримку!</h1>
    <div id="status-container">
        <div class="timer-circle" id="timer">50</div>
        <p id="countdown-text">Готуємо посилання для скачування...</p>
        <p id="status" style="color: #ff4d4d; margin-top: 20px; font-weight: bold;"></p>
    </div>
    <div id="download-container"></div>

    <script>
        const rawParam = new URLSearchParams(window.location.search).get('file');
        const fileName = rawParam ? rawParam.replace(/[»«]/g, '').trim() : null;
        
        let timeLeft = 50;
        const timerElement = document.getElementById('timer');
        const countdownText = document.getElementById('countdown-text');

        // Запускаємо візуальний відлік
        const countdownInterval = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                timerElement.innerText = "0";
                countdownText.innerText = "З'єднуємо з сервером...";
            }
        }, 1000);

        async function prepareDownload() {
            // Чекаємо поки пройде час або сервер прокинеться
            // Ми починаємо опитувати сервер одразу, але показуємо результат пізніше
            try {
                let songs = null;
                
                // Робимо спроби запиту кожні 5 секунд
                for (let i = 0; i < 15; i++) {
                    try {
                        const response = await fetch("https://andreygerc11-music-site.onrender.com/api/music");
                        if (response.ok) {
                            songs = await response.json();
                            break;
                        }
                    } catch (e) { console.log("Сервер ще спить..."); }
                    await new Promise(res => setTimeout(res, 4000));
                }

                // Коли дані отримані, чекаємо закінчення візуального таймера для краси, 
                // або якщо сервер думав довго — виводимо одразу
                if (timeLeft > 0) {
                    await new Promise(res => setTimeout(res, 2000)); 
                }

                const song = songs ? songs.find(s => s.name.trim() === fileName) : null;

                if (song && song.id) {
                    clearInterval(countdownInterval);
                    document.getElementById('status-container').style.display = 'none';
                    
                    const downloadUrl = `https://drive.google.com/uc?export=download&id=${song.id}`;
                    
                    document.getElementById('download-container').innerHTML = `
                        <p style="font-size: 1.5rem; margin-bottom: 20px;">Пісня <b>${fileName}</b> готова!</p>
                        <a href="${downloadUrl}" class="btn-download" style="display: inline-block;">ПОЧАТИ ЗАВАНТАЖЕННЯ</a>
                        <p style="margin-top: 30px; color: #888;">Скачування має початися автоматично...</p>
                    `;

                    // Автоматичний старт завантаження
                    window.location.href = downloadUrl;
                } else {
                    document.getElementById('status').innerText = "Помилка: Файл не знайдено. Перевірте назву на Диску.";
                }
            } catch (e) {
                document.getElementById('status').innerText = "Сервер не відповів вчасно. Спробуйте оновити сторінку.";
            }
        }

        if (fileName) {
            prepareDownload();
        } else {
            document.getElementById('status').innerText = "Назва файлу не вказана у посиланні.";
            clearInterval(countdownInterval);
        }
    </script>
</body>
</html>
