<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завантаження пісні | Андрій Герц</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0b; color: white; font-family: 'Montserrat', sans-serif; text-align: center; padding-top: 100px; }
        .btn-download { background: #ff4d4d; color: white; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 25px; transition: 0.3s; }
        .btn-download:hover { background: white; color: #ff4d4d; }
    </style>
</head>
<body>
    <h1>Дякуємо за підтримку!</h1>
    <p id="status">Шукаємо вашу пісню на Google Диску...</p>
    <div id="download-container"></div>

    <script>
        // Очищаємо назву файлу від зайвих символів, які додає Monobank (наприклад, »)
        const rawParam = new URLSearchParams(window.location.search).get('file');
        const fileName = rawParam ? rawParam.replace(/[»«]/g, '').trim() : null;

        async function prepareDownload() {
            try {
                // Питаємо у сервера список пісень з їх ID
                const response = await fetch("https://andreygerc11-music-site.onrender.com/api/music");
                const songs = await response.json();
                
                // Знаходимо ID пісні за назвою
                const song = songs.find(s => s.name.trim() === fileName);

                if (song && song.id) {
                    document.getElementById('status').innerHTML = `Пісня <b>${fileName}</b> готова до завантаження.`;
                    const downloadUrl = `https://drive.google.com/uc?export=download&id=${song.id}`;
                    
                    document.getElementById('download-container').innerHTML = `
                        <a href="${downloadUrl}" class="btn-download">НАТИСНІТЬ ТУТ ДЛЯ СКАЧУВАННЯ</a>
                    `;
                    // Автоматичний старт
                    window.location.href = downloadUrl;
                } else {
                    document.getElementById('status').innerText = "Помилка: Пісню не знайдено на Диску.";
                }
            } catch (e) {
                document.getElementById('status').innerText = "Помилка зв'язку з сервером.";
            }
        }

        if (fileName) { prepareDownload(); } 
        else { document.getElementById('status').innerText = "Назва файлу не вказана."; }
    </script>
</body>
</html>
