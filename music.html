<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музична Сповідь | Андрій Герц</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff4d4d; --dark: #0a0a0b; --card: #161618; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: #fff; min-height: 100vh; }
        .header-nav { padding: 40px 20px; text-align: center; background: #151515; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn-back { text-decoration: none; color: #fff; border: 1px solid var(--accent); padding: 10px 25px; border-radius: 50px; display: inline-block; margin-bottom: 15px; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        /* Блок опису */
        .download-info { background: var(--card); border: 1px solid var(--accent); border-radius: 15px; padding: 20px; margin-bottom: 30px; }
        .download-info h2 { color: var(--accent); font-size: 1.1rem; margin-bottom: 10px; }
        .download-info p { font-size: 0.9rem; line-height: 1.4; color: #ccc; }

        .music-card { background: var(--card); border-radius: 24px; padding: 25px; margin-bottom: 30px; border-left: 5px solid var(--accent); }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        
        /* Тільки одна кнопка */
        .btn-buy { background: var(--accent); color: #fff; padding: 12px 22px; border-radius: 50px; text-decoration: none; font-weight: 900; }
        
        .player-wrapper { width: 100%; height: 54px; background: #222; border-radius: 14px; margin-top: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        iframe { width: 100%; height: 160px; border: none; filter: invert(0.9) hue-rotate(180deg); }
        .play-btn { background: none; border: none; color: #fff; cursor: pointer; width: 100%; height: 100%; font-weight: 700; font-family: inherit; }
    </style>
</head>
<body>

<div class="header-nav">
    <a href="index.html" class="btn-back">← На головну</a>
    <h1>Музична Сповідь</h1>
</div>

<div class="container">
    <div class="download-info">
        <h2>ℹ️ Як завантажити трек?</h2>
        <p>1. Послухайте прев'ю в плеєрі.<br>
           2. Натисніть <b>"Придбати"</b> — вас перекине в Telegram-бот.<br>
           3. Після оплати зачекайте 5 хвилин і бот надішле файл для скачування.</p>
    </div>

    <div id="music-container">
        <p style="text-align:center;">Завантаження пісень...</p>
    </div>
</div>

<script>
    const apiURL = "https://andreygerc11-music-site.onrender.com/api/music";

    async function getMusic() {
        const container = document.getElementById('music-container');
        try {
            const response = await fetch(apiURL);
            const data = await response.json();
            
            container.innerHTML = '';
            data.forEach(song => {
                const card = document.createElement('div');
                card.className = 'music-card';
                card.innerHTML = `
                    <div class="card-header">
                        <h3>${song.name}</h3>
                        <a href="https://t.me/golosprotyraku_bot?start=buy_${song.id}" target="_blank" class="btn-buy">Придбати</a>
                    </div>
                    <div class="player-wrapper" id="player-${song.id}">
                        <button class="play-btn" onclick="loadPlayer('${song.id}')">СЛУХАТИ ПРЕВ'Ю</button>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = "<p style='text-align:center;'>Помилка сервера. Спробуйте оновити сторінку.</p>";
        }
    }

    function loadPlayer(id) {
        const wrapper = document.getElementById('player-' + id);
        wrapper.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview"></iframe>`;
    }

    getMusic();
</script>
</body>
</html>
