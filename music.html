<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музична Сповідь | Андрій Герц</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ff4d4d; --dark: #0a0a0b; --card: #161618; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--dark); 
            color: #fff; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-nav { 
            padding: 40px 20px; 
            text-align: center; 
            background: #151515; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn-back { 
            text-decoration: none; 
            color: #fff; 
            border: 1px solid var(--accent); 
            padding: 10px 25px; 
            border-radius: 50px; 
            transition: 0.3s;
            font-weight: bold;
        }
        .btn-back:hover { background: var(--accent); }

        .btn-whatsapp {
            text-decoration: none;
            color: #fff;
            background: #25D366;
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.3s;
            font-weight: bold;
        }
        .btn-whatsapp:hover { background: #1ebe57; }

        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        .download-info { 
            background: var(--card); 
            border: 1px solid var(--accent); 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 30px;
            animation: fadeInUp 0.6s ease-out;
        }

        #music-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
            gap: 20px; 
        }

        .music-card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.4s;
            animation: fadeInUp 0.8s ease-out backwards;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .music-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(255, 77, 77, 0.1);
        }

        .card-header { margin-bottom: 15px; }
        .card-header h3 { font-size: 1.1rem; margin-bottom: 10px; min-height: 44px; }
        
        .btn-buy { 
            background: var(--accent); 
            color: #fff; 
            padding: 10px 0; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: 900; 
            display: block;
            text-align: center;
            width: 100%;
            transition: 0.3s;
        }
        .btn-buy:hover { opacity: 0.8; }
        
        .player-wrapper { 
            width: 100%; 
            height: 45px; 
            background: #222; 
            border-radius: 10px; 
            margin-top: 15px; 
            overflow: hidden; 
        }
        iframe { width: 100%; height: 120px; border: none; filter: invert(0.9) hue-rotate(180deg); margin-top: -38px; }
        
        .play-btn { 
            background: #2a2a2c; 
            border: none; 
            color: #fff; 
            cursor: pointer; 
            width: 100%; 
            height: 100%; 
            font-weight: 700; 
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .play-btn:hover { background: #333; color: var(--accent); }

        @media (max-width: 600px) {
            #music-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header-nav">
    <div class="nav-buttons">
        <a href="index.html" class="btn-back">← На головну</a>
        <a href="https://chat.whatsapp.com/GbGbFxDZftZCQNyTDZOfu2" target="_blank" class="btn-whatsapp"><i class="fab fa-whatsapp"></i> Чат WhatsApp</a>
    </div>
    <h1>Музична Сповідь</h1>
</div>

<div class="container">
    <div class="download-info">
        <h2>ℹ️ Як отримати трек?</h2>
        <p>Слухайте прев'ю, натискайте <b>"Придбати"</b>. Вас перекине в бот, де після оплати ви отримаєте посилання на файл.</p>
    </div>

    <div id="music-container">
        <p style="text-align:center;">Завантаження пісень...</p>
    </div>
</div>

<script>
    const apiURL = "https://andreygerc11-music-site.onrender.com/api/music";

    async function getMusic() {
        const container = document.getElementById('music-container');
        try {
            const response = await fetch(apiURL);
            const data = await response.json();
            
            container.innerHTML = '';
            data.forEach((song, index) => {
                const card = document.createElement('div');
                card.className = 'music-card';
                card.style.animationDelay = (index * 0.1) + 's';
                
                card.innerHTML = `
                    <div class="card-header">
                        <h3>${song.name}</h3>
                        <a href="https://t.me/golosprotyraku_bot?start=buy_${song.id}" target="_blank" class="btn-buy">Придбати</a>
                    </div>
                    <div class="player-wrapper" id="player-${song.id}">
                        <button class="play-btn" onclick="loadPlayer('${song.id}')">▶ СЛУХАТИ ПРЕВ'Ю</button>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = "<p style='text-align:center;'>Помилка сервера. Спробуйте оновити сторінку.</p>";
        }
    }

    function loadPlayer(id) {
        const wrapper = document.getElementById('player-' + id);
        wrapper.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview"></iframe>`;
    }

    getMusic();
</script>
</body>
</html>
