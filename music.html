<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музична Сповідь | Андрій Герц</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --accent: #ff4d4d; 
            --dark: #0a0a0b; 
            --card: #161618;
            --glass: rgba(0, 0, 0, 0.85); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--dark); 
            color: #fff; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-nav { 
            padding: 30px 20px; 
            text-align: center; 
            background: #151515; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .btn-back { 
            text-decoration: none; 
            color: #fff; 
            border: 1px solid var(--accent); 
            padding: 8px 20px; 
            border-radius: 50px; 
            display: inline-block; 
            margin-bottom: 10px;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .btn-back:hover { background: var(--accent); }
        h1 { font-size: 1.8rem; }

        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        .download-info { 
            background: var(--card); 
            border: 1px solid var(--accent); 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 30px;
            animation: fadeInUp 0.6s ease-out;
        }
        .download-info h2 { font-size: 1.3rem; margin-bottom: 10px; }
        .download-info p { font-size: 1rem; color: #ccc; }

        #music-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
        }

        .music-card { 
            background: var(--card); 
            border-radius: 15px; 
            padding: 15px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
            animation: fadeInUp 0.8s ease-out backwards;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .music-card:hover { 
            border-color: rgba(255, 77, 77, 0.3);
            transform: translateY(-3px);
        }

        .card-header-row { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .card-header-row h3 { 
            font-size: 1rem; 
            font-weight: 700;
            color: #fff;
            flex: 1; 
            display: -webkit-box;
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
        
        .btn-buy { 
            background: var(--accent); 
            color: #fff; 
            padding: 8px 16px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 900; 
            text-transform: uppercase;
            font-size: 0.75rem; 
            letter-spacing: 0.5px;
            transition: 0.3s;
            white-space: nowrap; 
        }
        .btn-buy:hover { opacity: 0.8; }
        
        .player-wrapper { 
            width: 100%; 
            height: 45px; 
            margin-top: 5px; 
            border-radius: 8px;
            overflow: hidden; 
            position: relative;
            background: #222;
        }
        
        .play-btn { 
            background: #2a2a2c; 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #ccc; 
            cursor: pointer; 
            width: 100%; 
            height: 100%; 
            border-radius: 8px;
            font-weight: 700; 
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-btn:hover { background: #333; border-color: var(--accent); color: var(--accent); }

        @media (max-width: 600px) {
            #music-container { grid-template-columns: 1fr; }
            .card-header-row h3 { font-size: 0.95rem; }
        }

        /* ====== СТИЛІ ДЛЯ ВІДЖЕТА ПІДТРИМКИ (ЧАТ) ====== */
        .support-widget {
            position: fixed;
            top: 50%;
            right: -320px;
            transform: translateY(-50%);
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--accent);
            border-right: none;
            border-radius: 20px 0 0 20px;
            padding: 25px;
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 9999;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }
        .support-widget.open {
            right: 0; 
        }
        .support-btn {
            position: absolute;
            left: -45px; 
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent);
            color: white;
            padding: 20px 10px;
            border-radius: 15px 0 0 15px;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-weight: 900;
            font-size: 0.9rem;
            text-transform: uppercase;
            box-shadow: -5px 0 15px rgba(255, 77, 77, 0.4);
            animation: pulse-support 2s infinite;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        @keyframes pulse-support {
            0% { box-shadow: -2px 0 10px rgba(255, 77, 77, 0.4); }
            50% { box-shadow: -2px 0 25px rgba(255, 77, 77, 0.8); }
            100% { box-shadow: -2px 0 10px rgba(255, 77, 77, 0.4); }
        }
        .support-widget h3 { margin-bottom: 15px; color: #fff; font-size: 1.2rem; margin-top: 0;}
        .support-widget input, .support-widget textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        .support-widget input:focus, .support-widget textarea:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.1);
        }
        .support-widget textarea { resize: none; height: 100px; }
        .support-widget button[type="submit"] {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .support-widget button[type="submit"]:hover { 
            background: white; 
            color: var(--accent); 
        }
        #support-status { margin-top: 15px; font-size: 0.9rem; text-align: center; font-weight: bold;}
    </style>
</head>
<body>

<div class="header-nav">
    <a href="index.html" class="btn-back">← На головну</a>
    <h1>Музична Сповідь</h1>
</div>

<div class="container">
    <div class="download-info">
        <h2>ℹ️ Як отримати трек?</h2>
        <p>Слухайте прев'ю, натискайте <b>"ПРИДБАТИ"</b>. Вас перекине в бот, де після оплати ви отримаєте посилання на файл.</p>
    </div>

    <div id="music-container">
        <p style="text-align:center;">Завантаження пісень...</p>
    </div>
</div>

<div class="support-widget" id="supportWidget">
    <div class="support-btn" onclick="toggleSupport()">
        <i class="fas fa-envelope" style="transform: rotate(90deg);"></i>
        ЧАТ
    </div>
    <h3>Написати мені</h3>
    <form id="supportForm">
        <input type="text" id="supName" name="Ім'я" placeholder="Ваше ім'я" required>
        <input type="text" id="supContact" name="Контактні дані" placeholder="Ваш Email, Telegram, Viber, WhatsApp, Teams чи Signal" required>
        <textarea id="supMessage" name="Повідомлення" placeholder="Якщо виникли питання чи проблеми із завантаженням пісні — пишіть сюди..." required></textarea>
        <button type="submit">Відправити</button>
    </form>
    <div id="support-status"></div>
</div>
<script>
    const apiURL = "https://andreygerc11-music-site.onrender.com/api/music";

    async function getMusic() {
        const container = document.getElementById('music-container');
        try {
            const response = await fetch(apiURL);
            const data = await response.json();
            
            container.innerHTML = '';
            data.forEach((song, index) => {
                const card = document.createElement('div');
                card.className = 'music-card';
                card.style.animationDelay = (index * 0.1) + 's';
                
                card.innerHTML = `
                    <div class="card-header-row">
                        <h3>${song.name}</h3>
                        <a href="https://t.me/golosprotyraku_bot?start=buy_${song.id}" target="_blank" class="btn-buy">Придбати</a>
                    </div>
                    <div class="player-wrapper" id="player-${song.id}">
                        <button class="play-btn" onclick="loadPlayer('${song.id}')">▶ СЛУХАТИ ПРЕВ'Ю</button>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = "<p style='text-align:center;'>Помилка сервера. Спробуйте оновити сторінку.</p>";
        }
    }

    function loadPlayer(id) {
        const wrapper = document.getElementById('player-' + id);
        wrapper.innerHTML = `
            <iframe src="https://drive.google.com/file/d/${id}/preview" 
                    style="width: calc(100% + 70px); height: 60px; border: none; position: absolute; top: -7px; left: -15px; filter: invert(0.9) hue-rotate(180deg);">
            </iframe>
        `;
    }

    getMusic();

    // ====== ЛОГІКА ВІДЖЕТА ПІДТРИМКИ ======
    function toggleSupport() {
        document.getElementById('supportWidget').classList.toggle('open');
    }

    document.getElementById('supportForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const statusDiv = document.getElementById('support-status');
        const btn = this.querySelector('button');
        const name = document.getElementById('supName').value;
        const contact = document.getElementById('supContact').value;
        const message = document.getElementById('supMessage').value;

        btn.disabled = true;
        btn.innerText = 'Відправка...';
        statusDiv.innerText = '';

        try {
            const response = await fetch('https://formspree.io/f/mnjgapgj', {
                method: 'POST',
                headers: { 
                    'Accept': 'application/json',
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ name: name, contact: contact, message: message })
            });

            if (response.ok) {
                statusDiv.innerText = '✅ Повідомлення відправлено!';
                statusDiv.style.color = '#4CAF50';
                this.reset();
                setTimeout(() => {
                    toggleSupport();
                    statusDiv.innerText = '';
                }, 4000);
            } else {
                throw new Error('Помилка сервера');
            }
        } catch (error) {
            statusDiv.innerText = '❌ Помилка. Спробуйте пізніше.';
            statusDiv.style.color = 'var(--accent)';
        } finally {
            btn.disabled = false;
            btn.innerText = 'Відправити';
        }
    });
</script>

</body>
</html>
