<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hertz Director | Студія Кліпів</title>
    
    <link rel="icon" type="image/png" href="favicon.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-base: #09090b;      
            --bg-panel: #141417;     
            --bg-card: rgba(20, 20, 23, 0.75);      
            --bg-input: #000000;     
            --border-color: rgba(255, 255, 255, 0.08);
            --accent: #ff3c00;       
            --text-main: #f0f0f0;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        /* Анімований фон у стилі проекту */
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1d 0%, #09090b 100%);
            z-index: -1;
        }

        /* Шапка */
        .top-bar {
            height: 65px; background: rgba(20, 20, 23, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 25px; z-index: 100; position: sticky; top: 0;
        }
        .logo { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; color: #fff; text-decoration: none; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        
        .back-link { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.3s; text-transform: uppercase;}
        .back-link:hover { color: #fff; }

        .btn-main {
            background: linear-gradient(45deg, var(--accent), #ff6a00); color: #fff; border: none; padding: 10px 25px; border-radius: 50px;
            font-size: 0.8rem; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 60, 0, 0.4); }
        .btn-main:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }

        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; width: 100%; }

        /* Панель вводу */
        .input-section {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 30px;
            margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); backdrop-filter: blur(10px);
        }
        .input-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .input-header h2 { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; }
        .input-header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }

        textarea { 
            width: 100%; height: 160px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 12px;
            color: #fff; padding: 20px; font-family: 'Montserrat', sans-serif; font-size: 0.95rem; resize: vertical; outline: none; transition: 0.3s;
            margin-bottom: 20px; border-left: 4px solid var(--accent);
        }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 60, 0, 0.1); }

        /* Повідомлення про завантаження */
        #loadingState { display: none; text-align: center; padding: 20px; color: var(--accent); }
        .spinner { animation: rotate 2s linear infinite; font-size: 2rem; margin-bottom: 10px; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* Storyboard Grid */
        .storyboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 20px; }

        .scene-card {
            background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden;
            display: flex; flex-direction: column; transition: 0.4s; position: relative;
        }
        .scene-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.6); }

        .scene-header { padding: 15px; background: rgba(255,255,255,0.03); display: flex; flex-direction: column; gap: 5px; }
        .scene-time { font-size: 0.7rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .scene-lyrics { font-size: 0.9rem; font-weight: 700; color: #fff; line-height: 1.4; font-style: italic; }

        .scene-preview {
            height: 180px; background: #000; position: relative; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);
        }
        .scene-preview img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.3s; }
        .scene-card:hover .scene-preview img { opacity: 1; }
        .preview-placeholder { font-size: 3rem; color: #222; }

        .btn-generate-scene {
            position: absolute; bottom: 15px; background: rgba(0,0,0,0.8); border: 1px solid var(--accent); color: #fff;
            padding: 8px 15px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(5px); text-transform: uppercase;
        }
        .btn-generate-scene:hover { background: var(--accent); }

        .scene-body { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .prompt-label { font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .scene-prompt { 
            width: 100%; height: 90px; background: #000; border: 1px solid var(--border-color); border-radius: 8px;
            color: #bbb; padding: 10px; font-size: 0.8rem; resize: none; outline: none;
        }
        .scene-prompt:focus { border-color: #555; color: #fff; }

        .scene-footer { display: flex; gap: 10px; }
        .btn-tool { 
            flex: 1; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); 
            padding: 8px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-tool:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: #fff; }

        /* Адаптація */
        @media (max-width: 768px) {
            .input-header { flex-direction: column; align-items: flex-start; }
            .storyboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="generator.html" onclick="if(window.opener){window.close(); return false;} else {return true;}" class="back-link"><i class="fas fa-arrow-left"></i> Повернутись в Генератор</a>
            <a href="#" class="logo">HERTZ <span>DIRECTOR</span></a>
        </div>
        <button class="btn-main" id="finalCompileBtn" disabled>
            <i class="fas fa-film"></i> Зібрати кліп
        </button>
    </header>

    <main class="container">
        
        <section class="input-section">
            <div class="input-header">
                <div>
                    <h2>Створити сценарій</h2>
                    <p>ШІ проаналізує ваш текст і запропонує візуальні образи для кожної сцени.</p>
                </div>
                <button class="btn-main" id="aiSplitBtn">
                    <i class="fas fa-robot"></i> Створити Storyboard
                </button>
            </div>
            
            <textarea id="lyricsInput" placeholder="Вставте текст пісні тут...&#10;Приклад:&#10;[00:00] Ніч накрила місто своїм крилом...&#10;[00:15] Я шукаю світло у пітьмі..."></textarea>
            
            <div id="loadingState">
                <div class="spinner"><i class="fas fa-circle-notch"></i></div>
                <p>ШІ розробляє режисерське бачення вашого кліпу...</p>
            </div>
        </section>

        <h2 id="gridTitle" style="display: none; margin-bottom: 20px; text-transform: uppercase; font-size: 1.2rem;">
            <i class="fas fa-th-large" style="color: var(--accent); margin-right: 10px;"></i> Кадри вашої історії
        </h2>

        <div class="storyboard-grid" id="storyboardContainer">
        </div>

    </main>

   <script>
        const aiSplitBtn = document.getElementById('aiSplitBtn');
        const lyricsInput = document.getElementById('lyricsInput');
        const loadingState = document.getElementById('loadingState');
        const storyboardContainer = document.getElementById('storyboardContainer');
        const gridTitle = document.getElementById('gridTitle');
        const finalCompileBtn = document.getElementById('finalCompileBtn');

        // === 1. ВИКЛИК ШІ ДЛЯ РОЗБИВКИ НА СЦЕНИ ===
        aiSplitBtn.addEventListener('click', async () => {
            const text = lyricsInput.value.trim();
            if (!text) { alert("Будь ласка, спочатку вставте текст пісні!"); return; }

            // UI стан завантаження
            aiSplitBtn.disabled = true;
            lyricsInput.style.display = 'none';
            loadingState.style.display = 'block';
            storyboardContainer.innerHTML = '';

            try {
                const response = await fetch('https://andreygerc11-music-site.onrender.com/api/generate-storyboard', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lyrics: text })
                });

                const scenes = await response.json();

                if (response.ok) {
                    renderStoryboard(scenes);
                    gridTitle.style.display = 'block';
                    finalCompileBtn.disabled = false;
                    
                    // Автоматичний запуск черги малювання
                    await generateImagesInQueue(scenes);
                } else {
                    alert("Помилка ШІ: " + (scenes.error || "Не вдалося створити сценарій."));
                    resetUI();
                }
            } catch (error) {
                console.error(error);
                alert("Помилка зв'язку з сервером.");
                resetUI();
            } finally {
                loadingState.style.display = 'none';
                if (storyboardContainer.innerHTML === '') lyricsInput.style.display = 'block';
            }
        });

        function resetUI() {
            aiSplitBtn.disabled = false;
            lyricsInput.style.display = 'block';
            gridTitle.style.display = 'none';
        }

        // === 2. ВІДОБРАЖЕННЯ КАРТОК STORYBOARD ===
        function renderStoryboard(scenes) {
            storyboardContainer.innerHTML = '';
            
            scenes.forEach(scene => {
                const card = document.createElement('div');
                card.className = 'scene-card';
                card.innerHTML = `
                    <div class="scene-header">
                        <span class="scene-time"><i class="far fa-clock"></i> ${scene.time}</span>
                        <span class="scene-lyrics">"${scene.lyrics}"</span>
                    </div>
                    <div class="scene-preview" id="preview-${scene.id}">
                        <i class="fas fa-film preview-placeholder" style="color: #333;"></i>
                        <p style="position:absolute; bottom:15px; font-size:10px; color:#555; text-transform:uppercase; font-weight:bold;">Очікування черги...</p>
                    </div>
                    <div class="scene-body">
                        <div class="prompt-label">Опис для ШІ (Промпт)</div>
                        <textarea class="scene-prompt" id="prompt-${scene.id}">${scene.prompt}</textarea>
                        <div class="scene-footer">
                            <button class="btn-tool" title="Завантажити свій файл"><i class="fas fa-upload"></i> Своє</button>
                            <button class="btn-tool" title="Налаштування руху"><i class="fas fa-expand"></i> Zoom</button>
                        </div>
                    </div>
                `;
                storyboardContainer.appendChild(card);
            });
        }

        // === 3. ЧЕРГА ТА РЕАЛЬНА ГЕНЕРАЦІЯ КАРТИНОК ===
        async function generateImagesInQueue(scenes) {
            for (let i = 0; i < scenes.length; i++) {
                await generateImageForScene(scenes[i].id);
            }
        }

        function generateImageForScene(sceneId) {
            return new Promise((resolve) => {
                const previewBox = document.getElementById(`preview-${sceneId}`);
                const promptArea = document.getElementById(`prompt-${sceneId}`);
                if (!previewBox || !promptArea) { resolve(false); return; }

                const prompt = promptArea.value.trim();
                
                previewBox.innerHTML = '<div class="spinner" style="color:var(--accent);"><i class="fas fa-circle-notch"></i></div><p style="position:absolute; bottom:10px; font-size:10px; color:white; font-weight:bold; text-transform:uppercase;">Малюю кадр...</p>';
                
                const seed = Math.floor(Math.random() * 10000000);
                
                // Жорсткий промпт на реалізм (плюс заборона на малюнки) і вимкнення "згладжування"
                const finalPrompt = encodeURIComponent(prompt + ", ultra photorealistic, live-action movie still, raw photography, 8k resolution, highly detailed skin and textures, shot on 35mm lens, natural lighting, NOT illustration, NOT 3d render, NOT cartoon");
                const imageUrl = `https://image.pollinations.ai/prompt/${finalPrompt}?width=1920&height=1080&nologo=true&seed=${seed}&model=flux`;
                
                const img = new Image();
                img.onload = () => {
                    previewBox.innerHTML = `
                        <img src="${imageUrl}" alt="Scene Image">
                        <button class="btn-generate-scene" onclick="generateImageForScene(${sceneId})">
                            <i class="fas fa-redo"></i> Переробити
                        </button>
                    `;
                    resolve(true); 
                };
                img.onerror = () => {
                    previewBox.innerHTML = `
                        <p style="color:#ff4d4d; font-size:12px; font-weight:bold;"><i class="fas fa-exclamation-triangle"></i> Помилка</p>
                        <button class="btn-generate-scene" onclick="generateImageForScene(${sceneId})">
                            <i class="fas fa-redo"></i> Спробувати ще
                        </button>
                    `;
                    resolve(false); 
                };
                
                img.src = imageUrl;
            });
        }

       // === 4. ЗБІРКА СЦЕНАРІЮ ТА ПЕРЕХІД В SPECTRUM ===
        finalCompileBtn.addEventListener('click', () => {
            const images = document.querySelectorAll('.scene-preview img');
            if (images.length === 0) {
                alert("Спочатку дочекайтеся генерації хоча б одного кадру!");
                return;
            }

            finalCompileBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Пакуємо сцени...';
            finalCompileBtn.disabled = true;

            let directorScript = [];
            
            const sceneCards = document.querySelectorAll('.scene-card');
            sceneCards.forEach((card) => {
                const timeText = card.querySelector('.scene-time').innerText;
                const startTimeStr = timeText.replace(/[^0-9:\-]/g, '').split('-')[0].trim();
                
                const parts = startTimeStr.split(':');
                let startSeconds = 0;
                if (parts.length === 2) {
                    startSeconds = parseInt(parts[0]) * 60 + parseInt(parts[1]);
                }
                
                const imgElement = card.querySelector('.scene-preview img');
                if (imgElement && imgElement.src) {
                    directorScript.push({ time: startSeconds, url: imgElement.src });
                }
            });

            directorScript.sort((a, b) => a.time - b.time);

            // Зберігаємо сценарій (це МИТТЄВО побачить відкрита вкладка Генератора)
            localStorage.setItem('hertz_director_script', JSON.stringify(directorScript));

            setTimeout(() => {
                // Якщо Режисер був відкритий з Генератора - просто закриваємо цю вкладку
                if (window.opener && !window.opener.closed) {
                    window.close();
                } else {
                    // Якщо відкрили якось інакше - робимо редирект
                    window.location.href = 'generator.html?mode=director';
                }
            }, 800);
        });
    </script>

</body>
</html>
