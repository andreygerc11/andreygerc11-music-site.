<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Успішна оплата | Музична Сповідь</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #0a0a0b; 
            color: #fff; 
            text-align: center; 
            padding: 10vh 20px; 
            margin: 0;
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: #161618; 
            padding: 40px 30px; 
            border-radius: 15px; 
            border: 1px solid #ff4d4d;
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.1);
        }
        h1 { color: #4CAF50; margin-bottom: 20px; font-size: 1.8rem; }
        p { font-size: 1.1rem; color: #ccc; margin-bottom: 30px; line-height: 1.6; }
        .btn { 
            display: inline-block;
            background: #ff4d4d; 
            color: #fff; 
            padding: 12px 30px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 700; 
            text-transform: uppercase;
            transition: 0.3s; 
        }
        .btn:hover { background: #fff; color: #ff4d4d; }
        .icon { font-size: 4rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>Оплата пройшла успішно!</h1>
        <p>Щиро дякуємо за вашу підтримку. Кожна придбана пісня — це внесок у проєкт «Голос проти раку».</p>
        <p>Якщо у вас виникли будь-які питання, напишіть нам через чат на сайті або у WhatsApp.</p>
        <a href="index.html" class="btn">Повернутися на головну</a>
    </div>
</body>
</html>
