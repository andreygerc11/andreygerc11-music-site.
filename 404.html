<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        // Цей скрипт миттєво виправляє посилання Monobank
        var url = window.location.href;
        if (url.includes("success-download.html")) {
            // Прибираємо все зайве після .html і перенаправляємо на чисту сторінку
            var cleanUrl = url.split('?')[0].split('.html')[0] + ".html" + window.location.search;
            window.location.replace(cleanUrl.replace(/[»«]/g, ''));
        }
    </script>
</head>
<body>
    <p>Завантаження... зачекайте секунду.</p>
</body>
</html>
